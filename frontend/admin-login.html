<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="/frontend/admin-login.css">
</head>
<body>

<div class="login-box">

    <h1>Admin Login</h1>

    <p>
        Secure login for administrators.<br>
        Manage users and attendance records.
    </p>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

<script src="/frontend/static/admin-login.js"></script>

</body>
</html>
