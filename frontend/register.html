        <!-- SIDEBAR -->

            <ul>

                <li><a href="/frontend/dashboard.html"><i class="fa-solid fa-table-columns"></i>Dashboard</a></li>

                <li><a href="/frontend/take-attendance.html"><i class="fa-solid fa-list-check"></i>Take Attendance</a></li>

            <!-- <li class="logout">
                <a href="#" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </li> -->
        </div>


   <div class="register-card">

    <div class="card-header">
        <h1>
            <i class="fa-solid fa-user-plus"></i>
            Student Registration
        </h1>

        <span id="currentDate"></span>
    </div>

    <div class="form-grid">

        <div class="input-group">
            <label>Student Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter Student Name"
            >
        </div>

        <div class="input-group">
            <label>Student ID</label>
            <input
                type="text"
                id="userid"
                placeholder="Enter Student ID"
            >
        </div>

        <div class="input-group">
            <label>Registration Date</label>
            <input
                type="text"
                id="date"
                readonly
            >
        </div>

    </div>

    <div class="camera-box">
        <video
            id="video"
            autoplay
            playsinline
            muted
        ></video>

        <canvas id="canvas"></canvas>
    </div>

    <button id="registerBtn" type="button">
        <i class="fa-solid fa-camera"></i>
        Register Face
    </button>

    <p id="message"></p>

</div>
